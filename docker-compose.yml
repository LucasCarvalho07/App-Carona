services:
  postgres:
    image: postgres:16
    container_name: carona_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: carona_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: ./backend
    container_name: carona_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      NHibernate__ExportarSchema: "true"
      # Master principal (quem pode promover outros a master). Vem do .env, não versionado.
      Admin__MasterEmails__0: "${MASTER_EMAIL}"
      # Sem SMTP no container: usa o fallback de dev (loga o código no `docker logs carona_api`).
      # Para enviar e-mail de verdade no Docker, defina Smtp__Host/Usuario/Senha aqui (ou via .env).
      Smtp__Host: ""
    ports:
      - "5080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /src/src
        - action: rebuild
          path: ./backend/src/AppCarona.Api/AppCarona.Api.csproj

  frontend:
    build:
      context: ./frontend
    container_name: carona_frontend
    restart: unless-stopped
    environment:
      # Chamadas /api são feitas via proxy do Vite para o serviço api.
      VITE_API_TARGET: http://api:8080
    ports:
      - "5173:5173"
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json

volumes:
  pgdata:
